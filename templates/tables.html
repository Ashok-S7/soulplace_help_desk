<!DOCTYPE html>
<html lang="en">
<head>
    <script>try{var t=localStorage.getItem('soulplace-theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table QR Codes – Soulplace Boardgames</title>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=11">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="tables-page">
    <div class="page-bg" aria-hidden="true"></div>
    <div class="live-bg" aria-hidden="true">
        <div class="live-bg__blob live-bg__blob--1"></div>
        <div class="live-bg__blob live-bg__blob--2"></div>
        <div class="live-bg__blob live-bg__blob--3"></div>
        <div class="live-bg__blob live-bg__blob--4"></div>
        <div class="live-bg__blob live-bg__blob--5"></div>
        <div class="live-bg__shimmer"></div>
    </div>
    <header class="login-header" style="opacity:1;visibility:visible;position:relative;">
        <button type="button" id="theme-toggle" title="Dark / Light" style="position:absolute;top:0.75rem;right:0.75rem;z-index:10;width:2.5rem;height:2.5rem;border-radius:50%;border:1px solid #e2e8f0;background:#fff;color:#0f172a;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1);line-height:1;">☽</button>
        <div class="logo">
            <div class="logo-img-wrap">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Soulplace logo" class="logo-img">
            </div>
            <span class="logo-main" style="display:block;font-size:2rem;font-weight:700;color:#0f172a;">SOULPLACE</span>
            <span class="logo-sub" style="display:block;font-size:0.8rem;font-weight:600;color:#0369a1;">BOARDGAMES – HELP DESK</span>
            <span class="brand-name-bar" style="display:block;margin:0.75rem auto 0;padding:0.4rem 1rem;font-size:1rem;font-weight:700;color:#0369a1;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);border-radius:999px;">Soulplace Boardgames</span>
        </div>
        <div class="header-line"></div>
        <p class="tables-intro">Scan the QR code at your table to request a Soul.</p>
    </header>

    <main class="tables-grid-wrap">
        <div class="tables-grid">
            {% for t in range(1, num_tables + 1) %}
            <div class="table-qr-card card-elevated">
                <span class="table-qr-label">Table {{ t }}</span>
                <a href="{{ base_url }}{{ url_for('main.table_page', table=t) }}" class="table-qr-link" aria-label="Request help for Table {{ t }}">
                    <img src="{{ base_url }}{{ url_for('main.qr_image', table_num=t) }}" alt="QR code for Table {{ t }}" class="table-qr-img" width="160" height="160">
                </a>
                <p class="table-qr-hint">Scan to request help</p>
            </div>
            {% endfor %}
        </div>
    </main>
    <p class="tables-footer">
        <a href="{{ base_url }}{{ url_for('main.login') }}" class="staff-link">Staff / Admin login</a>
        &nbsp;·&nbsp;
        <a href="{{ base_url }}{{ url_for('main.links_page') }}" class="staff-link">Your login link (long-distance)</a>
    </p>
    <p class="footer-brand">Soulplace Boardgames – Help Desk</p>
    <script>(function(){var k='soulplace-theme',s='\u2600',m='\u263D';function g(){try{var t=localStorage.getItem(k);return t==='dark'||t==='light'?t:'light';}catch(e){return 'light';}}function set(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem(k,t);}catch(e){}var b=document.getElementById('theme-toggle');if(b)b.textContent=t==='dark'?s:m;}set(g());var b=document.getElementById('theme-toggle');if(b)b.onclick=function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';set(n);};})();</script>
</body>
</html>
