<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deploy Soulplace to Vercel — Now</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f5f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      margin: 0;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #b8b8b0; font-size: 0.95rem; margin-bottom: 1.5rem; text-align: center; max-width: 360px; }
    a.btn {
      display: inline-block;
      background: #ff6a00;
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 0 24px rgba(255,106,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a.btn:hover { transform: scale(1.05); box-shadow: 0 0 32px rgba(255,106,0,0.5); }
    ol { text-align: left; color: #b8b8b0; font-size: 0.9rem; line-height: 1.8; max-width: 320px; }
  </style>
</head>
<body>
  <h1>Soulplace Help Desk → Vercel</h1>
  <p>Click the button below to open Vercel and create your deployment now.</p>
  <a class="btn" href="https://vercel.com/new" target="_blank" rel="noopener">Deploy to Vercel now</a>
  <ol style="margin-top: 2rem;">
    <li>Sign in with GitHub (or Google)</li>
    <li>Import your repo (upload this folder to GitHub first if needed)</li>
    <li>Click Deploy</li>
    <li>Copy your link when it’s done</li>
  </ol>
</body>
</html>
